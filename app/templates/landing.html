{% extends 'base.html' %}
{% block content %}
<div class="flex-grow flex items-center justify-center relative overflow-hidden py-20 bg-white">
    <!-- Subtle Background Accents -->
    <div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-40">
        <div class="absolute top-[-10%] left-[-10%] w-[40rem] h-[40rem] bg-brand-50 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[30rem] h-[30rem] bg-blue-50 rounded-full blur-[100px]"></div>
    </div>

    <div class="relative z-10 max-w-4xl mx-auto text-center px-4 sm:px-6 lg:px-8">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-8 text-slate-900 leading-tight">
            Next-Gen <br>
            <span class="text-brand-600">Event Automation</span>
        </h1>
        <p class="mt-4 text-xl md:text-2xl text-slate-600 max-w-2xl mx-auto mb-10 leading-relaxed font-medium">
            Automate your virtual events, scale your audience, and manage your online presence seamlessly with advanced
            AI workflows.
        </p>
        <div class="flex flex-col sm:flex-row justify-center gap-6">
            <a href="{{ url_for('auth_login.login') }}"
                class="px-10 py-5 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-2xl shadow-xl shadow-brand-200 transition-all duration-300 transform hover:-translate-y-1 text-lg">
                Get Started for Free
            </a>
            <a href="{{ url_for('ui_endpoints.browse_events') }}"
                class="px-10 py-5 bg-white border-2 border-slate-200 text-slate-700 font-bold rounded-2xl shadow-lg hover:bg-slate-50 transition-all duration-300 transform hover:-translate-y-1 text-lg">
                Browse Events
            </a>
        </div>
    </div>
</div>
{% endblock %}
