{% extends 'base.html' %}
{% block content %}
<div class="flex-grow flex items-center justify-center relative overflow-hidden">
    <div
        class="absolute top-[-10%] left-[10%] w-96 h-96 bg-primary-600 rounded-full mix-blend-screen filter blur-[100px] opacity-20">
    </div>
    <div
        class="absolute bottom-[-10%] right-[10%] w-96 h-96 bg-primary-800 rounded-full mix-blend-screen filter blur-[100px] opacity-30">
    </div>

    <div class="relative z-10 max-w-4xl mx-auto text-center px-4 sm:px-6 lg:px-8">
        <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-8 text-white">
            Next-Gen <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary-400 to-blue-200">Event
                Automation</span>
        </h1>
        <p class="mt-4 text-xl md:text-2xl text-gray-300 max-w-2xl mx-auto mb-10">
            Automate your virtual events, scale your audience, and manage your online presence seamlessly with advanced
            AI workflows.
        </p>
        <div class="flex justify-center gap-4">
            <a href="{{ url_for('auth_login.login') }}"
                class="px-8 py-4 bg-primary-600 hover:bg-primary-500 text-white font-semibold rounded-xl shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-all duration-300 transform hover:-translate-y-1">
                Login / Create Account
            </a>
        </div>
    </div>
</div>
{% endblock %}
