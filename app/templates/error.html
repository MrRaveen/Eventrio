{% extends 'base.html' %}
{% block content %}
<div
    class="min-h-screen bg-slate-50 dark:bg-slate-950 flex flex-col items-center justify-center p-6 transition-colors duration-200">
    <div class="text-center max-w-lg relative">

        <div class="absolute inset-0 flex items-center justify-center pointer-events-none select-none">
            <span class="text-[12rem] font-black text-slate-200 dark:text-brand-900/30">{{ error_code | default('404')
                }}</span>
        </div>

        <div class="relative z-10">
            <div
                class="mb-6 inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 dark:bg-red-900/30 text-red-500 dark:text-red-400">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
            </div>

            <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-4 tracking-tight">
                {{ error_title | default('Page Not Found') }}
            </h2>

            <p class="text-slate-500 dark:text-slate-400 mb-8 text-lg">
                {{ error_message | default("The page you are looking for doesn't exist, has been moved, or is
                temporarily unavailable.") }}
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <button onclick="history.back()"
                    class="w-full sm:w-auto px-6 py-3 rounded-lg font-bold border-2 border-slate-200 dark:border-brand-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-brand-800 transition-colors">
                    Go Back
                </button>
                <a href="{{ url_for('ui_endpoints.dashboard') }}"
                    class="w-full sm:w-auto px-6 py-3 rounded-lg font-bold bg-brand-500 text-white hover:bg-brand-600 shadow-md transition-all">
                    Return to Dashboard
                </a>
            </div>
        </div>

    </div>
</div>
{% endblock %}
