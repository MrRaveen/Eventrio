{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden" style="background:var(--bg-body);">

    <div class="w-full max-w-sm relative z-10">

        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-5" style="background:var(--brand-solid);">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight" style="color:var(--text-primary);">Eventrio</h1>
            <p class="text-sm font-medium mt-2" style="color:var(--text-muted);">Professional Event Orchestration</p>
        </div>

        <!-- Card -->
        <div class="ev-card p-8 rounded-2xl" style="box-shadow:var(--shadow-lg);">
            <h2 class="text-xl font-bold mb-1" style="color:var(--text-primary);">Welcome back</h2>
            <p class="text-sm mb-8" style="color:var(--text-secondary);">Sign in to access your dashboard</p>

            <a href="{{ url_for('auth_login.google_login') }}"
               class="ev-btn ev-btn-ghost w-full py-3.5 font-semibold text-sm">
                <svg class="h-5 w-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.43-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </a>

            <div class="mt-6 pt-6" style="border-top:1px solid var(--border);">
                <p class="text-xs text-center" style="color:var(--text-muted);">By continuing, you agree to our Terms & Privacy Policy</p>
            </div>
        </div>

        <!-- Theme toggle -->
        <div class="flex justify-center mt-6">
            <button onclick="toggleTheme()" class="theme-toggle" style="width:auto; padding:8px 16px; border-radius:99px;">
                <svg class="theme-icon-light" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.95 16.95l.707.707M7.05 7.05l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                <svg class="theme-icon-dark" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            </button>
        </div>
    </div>
</div>
{% endblock %}
