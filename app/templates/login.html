{% extends 'base.html' %}
{% block content %}
<div class="flex-grow flex items-center justify-center p-4">
    <div class="bg-darkcard p-8 rounded-2xl shadow-2xl max-w-md w-full border border-gray-800/50">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Welcome</h2>
            <p class="text-gray-400 mt-2">Log in or create an account to continue</p>
        </div>
        
        <a href="{{ url_for('auth_login.google_login') }}" class="w-full flex items-center justify-center gap-3 bg-white text-gray-900 font-semibold py-3 px-4 rounded-lg hover:bg-gray-100 transition-colors duration-200 mb-6 shadow-lg">
            <svg class="h-6 w-6" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12.0003 4.75C13.7703 4.75 15.3553 5.36002 16.6053 6.54998L20.0303 3.125C17.9502 1.19 15.2353 0 12.0003 0C7.31028 0 3.25527 2.69 1.25027 6.60998L5.32028 9.77C6.27528 6.61 9.20528 4.75 12.0003 4.75Z" fill="#EA4335"></path>
                <path d="M23.49 12.275C23.49 11.49 23.415 10.73 23.3 10H12V14.51H18.47C18.18 15.99 17.34 17.25 16.08 18.1L20.18 21.29C22.57 19.09 23.49 15.9 23.49 12.275Z" fill="#4285F4"></path>
                <path d="M5.26498 14.2949C5.02498 13.5649 4.88501 12.7949 4.88501 11.9949C4.88501 11.1949 5.01998 10.4249 5.26498 9.6949L1.275 6.40991C0.46 8.02991 0 9.86991 0 11.9949C0 14.1199 0.46 15.9599 1.28 17.5799L5.26498 14.2949Z" fill="#FBBC05"></path>
                <path d="M12.0004 24C15.2404 24 17.9654 22.935 20.0654 21.095L16.0754 17.905C15.0054 18.64 13.6204 19.09 12.0004 19.09C9.23042 19.09 6.2854 17.25 5.3254 14.29L1.25037 17.47C3.24537 21.36 7.30042 24 12.0004 24Z" fill="#34A853"></path>
            </svg>
            Continue with Google
        </a>

        <p class="text-xs text-center text-gray-500">
            For this MVP, please use the button above to test the authentication flow.
        </p>
    </div>
</div>
{% endblock %}
