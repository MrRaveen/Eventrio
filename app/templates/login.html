{% extends 'base.html' %}
{% block content %}
<div
    class="min-h-screen bg-[#f8fafc] flex flex-col items-center justify-center p-6 relative overflow-hidden transition-colors duration-200">
    <!-- Subtle Background Accent -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-brand-50/50 rounded-full -mr-48 -mt-48 blur-3xl animate-pulse">
    </div>
    <div class="absolute bottom-0 left-0 w-64 h-64 bg-slate-100 rounded-full -ml-32 -mb-32 blur-2xl"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black text-brand-900 tracking-tighter">Eventrio</h1>
            <p class="text-slate-500 mt-2 font-bold uppercase tracking-widest text-[10px]">Professional Event
                Orchestration</p>
        </div>

        <div class="bg-white border border-slate-200/60 rounded-3xl p-10 shadow-2xl shadow-brand-900/10">
            <div class="mb-8">
                <h2 class="text-2xl font-black text-slate-900 tracking-tight">Welcome back</h2>
                <p class="text-slate-500 text-sm mt-1">Please sign in to your account</p>
            </div>

            <a href="{{ url_for('auth_login.google_login') }}"
                class="w-full flex items-center justify-center gap-3 px-6 py-4 bg-white border-2 border-slate-100 rounded-2xl text-slate-700 font-black hover:border-brand-500 hover:bg-slate-50 transition-all shadow-sm group active:scale-[0.98]">
                <svg class="h-6 w-6 group-hover:scale-110 transition-transform" aria-hidden="true" viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4"></path>
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853"></path>
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.43-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05"></path>
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335"></path>
                </svg>
                Continue with Google
            </a>

            <div class="mt-10 pt-8 border-t border-slate-100/80">
                <div
                    class="flex items-center justify-between opacity-60 grayscale hover:grayscale-0 transition-all duration-500">
                    <span class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Enterprise
                        Ready</span>
                    <span class="text-[10px] text-brand-600 uppercase font-black tracking-widest italic">AI
                        Powered</span>
                </div>
            </div>
        </div>

        <p class="text-[10px] text-center text-slate-400 mt-8 uppercase font-bold tracking-widest opacity-50">Eventrio
            MVP &copy; 2024</p>
    </div>
</div>
{% endblock %}
