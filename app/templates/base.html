<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventrio — Professional Event Orchestration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: {
                            50:'#F3F0FF', 100:'#E5DFFF', 200:'#C9BFFF', 300:'#A899FF',
                            400:'#8A72FF', 500:'#6E50F7', 600:'#5538E8', 700:'#4229CC',
                            800:'#2E1DA0', 900:'#1C1175', 950:'#0D0840',
                        }
                    }
                }
            }
        }
    </script>

    <!-- ═══ THEME SYSTEM ═══ -->
    <script>
        // Apply saved theme instantly to prevent flash
        (function() {
            var t = localStorage.getItem('eventrio-theme') || 'light';
            document.documentElement.className = t;
        })();
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }

        /* ════════════════════════════════════════════
           CSS CUSTOM PROPERTIES — LIGHT THEME (default)
           ════════════════════════════════════════════ */
        :root, html.light {
            --bg-body:        #F8F8FA;
            --bg-sidebar:     #FFFFFF;
            --bg-card:        #FFFFFF;
            --bg-surface:     #F3F3F6;
            --bg-input:       #F5F5F7;
            --bg-hover:       #EDEDF2;
            --bg-modal:       #FFFFFF;
            --bg-header:      rgba(255,255,255,0.85);

            --border:         #E5E5EA;
            --border-subtle:  #ECECF0;

            --text-primary:   #1A1A2E;
            --text-secondary: #6B6B80;
            --text-muted:     #9D9DB0;
            --text-inverse:   #FFFFFF;

            --brand-bg:       #F3F0FF;
            --brand-text:     #5538E8;
            --brand-border:   #E5DFFF;
            --brand-solid:    #6E50F7;
            --brand-solid-h:  #5538E8;

            --nav-active-bg:      #F3F0FF;
            --nav-active-text:    #5538E8;
            --nav-active-border:  #C9BFFF;
            --nav-text:           #6B6B80;
            --nav-hover-bg:       #F3F3F6;

            --shadow-sm:  0 1px 3px rgba(0,0,0,0.06);
            --shadow-md:  0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg:  0 8px 32px rgba(0,0,0,0.1);
            --shadow-modal: 0 20px 60px rgba(0,0,0,0.15);

            --overlay:    rgba(0,0,0,0.4);
            color-scheme: light;
        }

        /* ════════════════════════════════════════════
           CSS CUSTOM PROPERTIES — DARK THEME
           ════════════════════════════════════════════ */
        html.dark {
            --bg-body:        #0F0F17;
            --bg-sidebar:     #0D0D15;
            --bg-card:        #1A1A26;
            --bg-surface:     #15151F;
            --bg-input:       #1E1E2C;
            --bg-hover:       #22222F;
            --bg-modal:       #1A1A26;
            --bg-header:      rgba(15,15,23,0.85);

            --border:         #2A2A3A;
            --border-subtle:  #222232;

            --text-primary:   #E8E8F0;
            --text-secondary: #9898AC;
            --text-muted:     #5C5C72;
            --text-inverse:   #0F0F17;

            --brand-bg:       rgba(110,80,247,0.12);
            --brand-text:     #A899FF;
            --brand-border:   rgba(110,80,247,0.25);
            --brand-solid:    #6E50F7;
            --brand-solid-h:  #7E64F8;

            --nav-active-bg:      rgba(110,80,247,0.14);
            --nav-active-text:    #C9BFFF;
            --nav-active-border:  rgba(110,80,247,0.3);
            --nav-text:           #7A7A92;
            --nav-hover-bg:       rgba(255,255,255,0.05);

            --shadow-sm:  0 1px 3px rgba(0,0,0,0.3);
            --shadow-md:  0 4px 16px rgba(0,0,0,0.4);
            --shadow-lg:  0 8px 32px rgba(0,0,0,0.5);
            --shadow-modal: 0 20px 60px rgba(0,0,0,0.6);

            --overlay:    rgba(0,0,0,0.6);
            color-scheme: dark;
        }

        /* ════════════════════════════════════════════
           BASE STYLES
           ════════════════════════════════════════════ */
        body {
            background: var(--bg-body);
            color: var(--text-primary);
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Selection */
        ::selection { background: var(--brand-bg); color: var(--brand-text); }

        /* ════════════════════════════════════════════
           SIDEBAR NAV LINKS
           ════════════════════════════════════════════ */
        .nav-link {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 14px; border-radius: 8px;
            font-size: 13.5px; font-weight: 600;
            color: var(--nav-text);
            border: 1px solid transparent;
            transition: all 0.15s ease;
            text-decoration: none;
        }
        .nav-link svg { flex-shrink: 0; }
        .nav-link:hover {
            color: var(--text-primary);
            background: var(--nav-hover-bg);
        }
        .nav-link.active {
            color: var(--nav-active-text);
            background: var(--nav-active-bg);
            border-color: var(--nav-active-border);
        }

        /* ════════════════════════════════════════════
           COMMON UI COMPONENTS
           ════════════════════════════════════════════ */
        .ev-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
        }
        .ev-card:hover {
            border-color: var(--brand-border);
            box-shadow: var(--shadow-md);
        }

        .ev-input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 8px 14px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }
        .ev-input::placeholder { color: var(--text-muted); }
        .ev-input:focus { border-color: var(--brand-solid); }

        .ev-select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 6px 12px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .ev-select:focus { border-color: var(--brand-solid); }

        .ev-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px 20px; border-radius: 8px;
            font-size: 14px; font-weight: 600;
            border: none; cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
        }
        .ev-btn-primary {
            background: var(--brand-solid);
            color: #fff;
        }
        .ev-btn-primary:hover { background: var(--brand-solid-h); }
        .ev-btn-ghost {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .ev-btn-ghost:hover { background: var(--bg-hover); }

        .ev-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 6px;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .ev-badge-brand {
            background: var(--brand-bg);
            color: var(--brand-text);
            border: 1px solid var(--brand-border);
        }

        .ev-modal-overlay {
            background: var(--overlay);
            backdrop-filter: blur(4px);
        }
        .ev-modal {
            background: var(--bg-modal);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-modal);
            color: var(--text-primary);
        }

        .ev-table th {
            background: var(--bg-surface);
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        .ev-table td {
            border-bottom: 1px solid var(--border-subtle);
        }
        .ev-table tr:hover td {
            background: var(--bg-hover);
        }

        .text-primary   { color: var(--text-primary) !important; }
        .text-secondary  { color: var(--text-secondary) !important; }
        .text-muted      { color: var(--text-muted) !important; }
        .text-brand      { color: var(--brand-text) !important; }
        .bg-card         { background: var(--bg-card) !important; }
        .bg-surface      { background: var(--bg-surface) !important; }
        .border-theme    { border-color: var(--border) !important; }

        /* Theme toggle button */
        .theme-toggle {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; border-radius: 8px;
            cursor: pointer; border: none;
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-size: 12px; font-weight: 600;
            transition: all 0.15s;
            width: 100%;
        }
        .theme-toggle:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .theme-toggle svg { width: 16px; height: 16px; flex-shrink: 0; }

        /* Fade in */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeInUp { animation: fadeInUp 0.5s ease forwards; }
    </style>
</head>
<body class="min-h-screen antialiased">
    {% block content %}
    {% endblock %}
    {% include 'components/confirm_modal.html' %}
    {% block scripts %}
    {% endblock %}

    <!-- Theme toggle script -->
    <script>
        function toggleTheme() {
            var html = document.documentElement;
            var next = html.classList.contains('dark') ? 'light' : 'dark';
            html.className = next;
            localStorage.setItem('eventrio-theme', next);
            // Update toggle icons
            document.querySelectorAll('.theme-icon-light').forEach(el => el.style.display = next === 'light' ? 'none' : 'block');
            document.querySelectorAll('.theme-icon-dark').forEach(el => el.style.display = next === 'dark' ? 'none' : 'block');
        }
        // Init icons on load
        document.addEventListener('DOMContentLoaded', function() {
            var t = document.documentElement.className;
            document.querySelectorAll('.theme-icon-light').forEach(el => el.style.display = t === 'light' ? 'none' : 'block');
            document.querySelectorAll('.theme-icon-dark').forEach(el => el.style.display = t === 'dark' ? 'none' : 'block');
        });
    </script>
</body>
</html>
