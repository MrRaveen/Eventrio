<!-- Script Tab Component -->
<div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden p-6">
    <div class="flex justify-between items-center mb-6">
        <h3 class="font-bold text-slate-800 uppercase tracking-wider text-sm">Announcer Script</h3>
        <div class="flex gap-3">
            <button onclick="copyScript()"
                class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 font-bold text-sm rounded-lg transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
                    </path>
                </svg>
                Copy Script
            </button>
            <a href="https://docs.google.com/document/u/0/" target="_blank"
                class="px-4 py-2 bg-blue-50 text-blue-600 hover:bg-blue-100 hover:text-blue-700 font-bold text-sm rounded-lg transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14">
                    </path>
                </svg>
                Open Google Docs
            </a>
        </div>
    </div>
    {% if script_text %}
    <div id="scriptContent"
        class="bg-white rounded-lg p-6 font-mono text-sm text-slate-700 leading-relaxed whitespace-pre-wrap border border-slate-200 min-h-[300px]">
        {{ script_text }}</div>
    {% else %}
    <p class="text-slate-400 italic text-center py-8">No script has been generated for this event yet.</p>
    {% endif %}
</div>
