<!-- Meeting Tab Component -->
<div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden p-6 text-center space-y-4 py-12 flex flex-col items-center">
    <h3 class="font-bold text-slate-800 uppercase tracking-wider text-xl mb-2">Google Meet Details</h3>
    <p class="text-slate-500 mb-6 w-full max-w-lg mx-auto">This event has a designated online meeting room
        ready for attendees. Click below to join.</p>

    <div class="inline-flex flex-col items-center justify-center p-8 mt-4 bg-slate-50 border border-slate-200 rounded-xl w-full max-w-md mx-auto">
        <div class="bg-brand-100 text-brand-600 p-4 rounded-full mb-6 relative shadow-inner">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z">
                </path>
            </svg>
        </div>

        <span class="text-slate-500 font-mono text-xs uppercase tracking-widest font-bold mb-2">Meeting Link</span>
        <a href="{{ event.meetingUrl }}" target="_blank"
            class="text-brand-600 hover:text-brand-700 font-mono text-sm mb-8 break-all transition-colors">{{
            event.meetingUrl }}</a>

        <a href="{{ event.meetingUrl }}" target="_blank"
            class="px-8 py-3.5 bg-brand-600 text-white font-bold rounded-lg hover:bg-brand-700 transition-colors shadow-lg shadow-brand-500/30 flex items-center gap-3">
            Join Meeting Now
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14">
                </path>
            </svg>
        </a>
    </div>
</div>
