<!-- =============================== -->
<!-- Invite Contributor Modal        -->
<!-- =============================== -->
<div id="inviteModal"
    class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <h3 class="text-xl font-bold text-slate-800">Invite Contributor</h3>
            <button onclick="closeInviteModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <form id="inviteForm" onsubmit="submitInvitation(event)" class="p-6 space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Email
                    Address</label>
                <input type="email" name="targetEmail" required placeholder="example@gmail.com"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Role</label>
                <select name="roleName" id="roleSelect" required
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                    <!-- Options loaded via JS -->
                </select>
            </div>
            <div class="pt-4">
                <button type="submit"
                    class="w-full py-3 bg-brand-600 text-white font-bold rounded-lg hover:bg-brand-700 transition-all shadow-lg shadow-brand-200 flex items-center justify-center gap-2">
                    <span>Send Invitation</span>
                    <div id="inviteSpinner"
                        class="hidden animate-spin rounded-full h-4 w-4 border-2 border-white/20 border-b-white">
                    </div>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- =============================== -->
<!-- Edit Role Modal                 -->
<!-- =============================== -->
<div id="editRoleModal"
    class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <h3 class="text-xl font-bold text-slate-800">Update Contributor Role</h3>
            <button onclick="closeEditRoleModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <form id="editRoleForm" onsubmit="submitRoleUpdate(event)" class="p-6 space-y-4">
            <input type="hidden" id="editDocID">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Contributor</label>
                <div id="editTargetEmail"
                    class="w-full px-4 py-3 bg-slate-100 text-slate-500 rounded-lg font-medium"></div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Role</label>
                <select name="roleName" id="editRoleSelect" required
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all">
                    <!-- Options loaded via JS -->
                </select>
            </div>
            <div class="pt-4">
                <button type="submit"
                    class="w-full py-3 bg-brand-600 text-white font-bold rounded-lg hover:bg-brand-700 transition-all shadow-lg shadow-brand-200 flex items-center justify-center gap-2">
                    <span>Update Role</span>
                    <div id="editSpinner"
                        class="hidden animate-spin rounded-full h-4 w-4 border-2 border-white/20 border-b-white">
                    </div>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- =============================== -->
<!-- Assign Task Modal               -->
<!-- =============================== -->
<div id="assignTaskModal"
    class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <h3 class="text-lg font-bold text-slate-800">Assign Member</h3>
            <button onclick="closeAssignTaskModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <input type="hidden" id="assignTaskID">
            <div id="collabsContainer" class="space-y-2 max-h-[300px] overflow-y-auto pr-2">
                <!-- Collaborators loaded via JS -->
                <div class="animate-pulse flex flex-col gap-2">
                    <div class="h-10 bg-slate-100 rounded-lg"></div>
                    <div class="h-10 bg-slate-100 rounded-lg"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- =============================== -->
<!-- Edit Task Modal                 -->
<!-- =============================== -->
<div id="editTaskModal"
    class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <h3 class="text-xl font-bold text-slate-800">Edit Task Details</h3>
            <button onclick="closeEditTaskModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <form id="editTaskForm" onsubmit="submitTaskUpdate(event)" class="p-6 space-y-4">
            <input type="hidden" id="editTaskID">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Task
                    Title</label>
                <input type="text" name="title" id="editTaskTitle" required
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none">
            </div>
            <div>
                <label
                    class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Description</label>
                <textarea name="description" id="editTaskDescription" rows="3"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none resize-none"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label
                        class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Priority</label>
                    <select name="priority" id="editTaskPriority"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none">
                        <option value="lowest">Lowest</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>
                <div>
                    <label
                        class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Status</label>
                    <select name="status" id="editTaskStatus"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none">
                        <option value="in progress">In Progress</option>
                        <option value="done">Done</option>
                        <option value="under review">Under Review</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Start
                        Date</label>
                    <input type="datetime-local" name="startDate" id="editTaskStartDate"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none">
                </div>
                <div>
                    <label
                        class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Deadline</label>
                    <input type="datetime-local" name="deadline" id="editTaskDeadline"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none">
                </div>
            </div>
            <div class="pt-4">
                <button type="submit"
                    class="w-full py-3 bg-brand-600 text-white font-bold rounded-lg hover:bg-brand-700 transition-all shadow-lg shadow-brand-200 flex items-center justify-center gap-2">
                    <span>Save Changes</span>
                    <div id="editTaskSpinner"
                        class="hidden animate-spin rounded-full h-4 w-4 border-2 border-white/20 border-b-white">
                    </div>
                </button>
            </div>
        </form>
    </div>
</div>
